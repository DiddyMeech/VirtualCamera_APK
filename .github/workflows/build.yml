name: Build VCam Module
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    # REMOVED: chmod +x gradlew (Not needed anymore)
      
    - name: Build with Gradle
      # CHANGED: Uses system 'gradle' instead of './gradlew'
      run: gradle :app:assembleDebug --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: VCam-Debug
        path: app/build/outputs/apk/debug/*-debug.apk
